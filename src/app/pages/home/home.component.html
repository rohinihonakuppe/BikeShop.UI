<div class="container mt-3 mt-md-5">
  <div class="jumbotron mb-3 d-flex align-items-center justify-content-between">
    <h3>Find Your Next Bike</h3>
  </div>

  <div class="row">
    <div *ngFor="let bike of bikes" class="col-lg-4 col-md-6 col-sm-6">
      <app-item [bike]="bike" (addToFavourites)="addBikeToFavourites($event)"></app-item>
    </div>
  </div>
</div>
